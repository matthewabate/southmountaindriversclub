<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>South Mountain Drivers Club</title>
  <!-- Social sharing -->
  <meta name="description" content="South Mountain Drivers Club — a car enthusiasts' club based in Maplewood and South Orange, NJ." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://southmountaindrivers.com/" />
  <meta property="og:title" content="South Mountain Drivers Club" />
  <meta property="og:description" content="A car enthusiasts' club based in Maplewood and South Orange, NJ." />
  <meta property="og:image" content="https://southmountaindrivers.com/images/bg.jpg" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="South Mountain Drivers Club" />
  <meta name="twitter:description" content="A car enthusiasts' club based in Maplewood and South Orange, NJ." />
  <meta name="twitter:image" content="https://southmountaindrivers.com/images/bg.jpg" />

  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;900&display=swap" rel="stylesheet" />
  <style>
    @font-face {
      font-family: 'KyivType Sans';
      src: url('fonts/KyivTypeSans-Thin.woff2') format('woff2');
      font-weight: 100;
      font-style: normal;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: #0d1410 url('images/bg.jpg') center / cover no-repeat;
      color: #c9a84c;
    }

    .site-wrapper {
      width: 100%;
      max-width: 920px;
      flex: 1;
      display: flex;
      flex-direction: column;
      margin: 0 auto;
    }

    /* ── HERO ── */
    .hero {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .photo-credit {
      position: absolute;
      top: 12px;
      left: 22px;
      font-family: 'Outfit', sans-serif;
      font-size: 10px;
      font-weight: 500;
      line-height: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.65);
    }

    /* ── CARD ── */
    .card {
      background: rgba(8, 15, 11, 0.70);
      padding: 30px 42px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .club-pre {
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      font-weight: 900;
      line-height: 14px;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: #c9a84c;
      margin-bottom: 0;
    }

    h1 {
      font-family: 'KyivType Sans', sans-serif;
      font-weight: 100;
      font-size: 72px;
      font-weight: 400;
      line-height: 72px;
      color: #c9a84c;
      margin-bottom: 24px;
    }

    .divider {
      width: 100%;
      border: none;
      border-top: 1px solid #c9a84c;
      margin-bottom: 24px;
    }

    .links {
      width: 100%;
      font-family: 'Outfit', sans-serif;
      font-size: 12px;
      font-weight: 700;
      line-height: 12px;
      letter-spacing: 4px;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .links a {
      color: #c9a84c;
      text-decoration: none;
      transition: color 0.2s;
    }

    .links a:hover { color: #f5f0e8; }

    .sep { color: #c9a84c; }

    /* ── FOOTER ── */
    footer {
      background: #0d1410;
      font-family: 'Outfit', sans-serif;
      font-size: 10px;
      font-weight: 500;
      line-height: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #716953;
    }

    footer .inner {
      max-width: 920px;
      margin: 0 auto;
      padding: 12px 22px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
  @media (max-width: 600px) {
      .site-wrapper {
        padding: 0 20px;
      }

      .photo-credit {
        left: 50%;
        transform: translateX(-50%);
        white-space: nowrap;
        color: #716953;
      }

      .card {
        align-items: center;
        text-align: center;
      }

      h1 {
        font-size: 36px;
        line-height: 36px;
      }

      .links {
        flex-direction: column;
        align-items: center;
        gap: 6px;
      }

      footer .inner {
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 4px;
      }
    }
  </style>
</head>
<body>
<div class="site-wrapper">

  <div class="hero">
    <p class="photo-credit">Photo: Reiss Kelly-Alder</p>
    <div class="card">
      <p class="club-pre">South Mountain</p>
      <h1>Drivers Club</h1>
      <hr class="divider" />
      <div class="links">
        <a href="https://chat.whatsapp.com/BirxSVJoTvGKhb" target="_blank">WhatsApp</a>
        <span class="sep">•</span>
        <a href="https://www.facebook.com/groups/411909097711339/" target="_blank">Facebook</a>
        <span class="sep">•</span>
        <a href="https://www.instagram.com/southmountaindriversclub" target="_blank">Instagram</a>
      </div>
    </div>
  </div>


</div>

<footer>
  <div class="inner">
    <span>© 2026 South Mountain Drivers Club</span>
    <span>Established 2022</span>
  </div>
</footer>

</body>
</html>
